services:

  # ── Application (PHP + Apache) ────────────────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6080}:80"
    environment:
      APP_NAME: ${APP_NAME:-VendorComparison}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vendor_comparison}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-error}

      ODOO_URL: ${ODOO_URL}
      ODOO_DB: ${ODOO_DB}
      ODOO_USERNAME: ${ODOO_USERNAME}
      ODOO_API_KEY: ${ODOO_API_KEY}

      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${APP_NAME:-VendorComparison}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ── MySQL 8 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-vendor_comparison}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── phpMyAdmin ─────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-6082}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD}
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ── Queue worker ───────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vendor_comparison}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

volumes:
  mysql_data:
  app_storage:
  app_logs:

networks:
  backend:
